<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0d47a1,#6a1b9a);
}

.container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#0d47a1;
    margin-bottom:20px;
}

.input-box{
    position:relative;
    margin:18px 0;
}

.input-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#6a1b9a;
}

.input-box input{
    width:100%;
    padding:14px 14px 14px 45px;
    border:2px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

.input-box input:focus{
    border-color:#0d47a1;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#0d47a1,#6a1b9a);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

.switch{
    text-align:center;
    margin-top:15px;
}

.switch a{
    color:#6a1b9a;
    cursor:pointer;
    font-weight:bold;
}

.hidden{
    display:none;
}

.alert{
    display:none;
    background:#ffebee;
    color:#c62828;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
}

.strength-container{
    width:100%;
    height:8px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:8px;
}

#strengthBar{
    height:100%;
    width:0%;
    transition:0.4s;
}

#strengthText{
    margin-top:8px;
    font-size:14px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <div class="alert" id="alertBox"></div>

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>Login</h2>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Password">
        </div>

        <button onclick="login()">Login</button>

        <div class="switch">
            Don't have an account? <a onclick="showSignup()">Sign Up</a>
        </div>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="hidden">
        <h2>Sign Up</h2>

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="signupName" placeholder="Full Name">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Email">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Password">
        </div>

        <div class="strength-container">
            <div id="strengthBar"></div>
        </div>
        <p id="strengthText"></p>

        <button onclick="signup()">Sign Up</button>

        <div class="switch">
            Already have an account? <a onclick="showLogin()">Login</a>
        </div>
    </div>

</div>

<script>
function showAlert(message){
    let alertBox = document.getElementById("alertBox");
    alertBox.style.display = "block";
    alertBox.innerText = message;

    setTimeout(()=>{
        alertBox.style.display = "none";
    },3000);
}

function login(){
    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    if(email === "" || password === ""){
        showAlert("Please fill in all login fields!");
        return;
    }

    alert("Login Successful!");
}

function signup(){
    let name = document.getElementById("signupName").value.trim();
    let email = document.getElementById("signupEmail").value.trim();
    let password = document.getElementById("signupPassword").value.trim();

    if(name === "" || email === "" || password === ""){
        showAlert("Please fill in all signup fields!");
        return;
    }

    alert("Sign Up Successful!");
}

function showSignup(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("signupForm").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("signupForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

const passwordInput = document.getElementById("signupPassword");

passwordInput.addEventListener("input", checkPasswordStrength);

function checkPasswordStrength(){
    let password = passwordInput.value;
    let strengthBar = document.getElementById("strengthBar");
    let strengthText = document.getElementById("strengthText");

    let strength = 0;

    if(password.length >= 8) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[^A-Za-z0-9]/.test(password)) strength++;

    switch(strength){
        case 0:
        case 1:
            strengthBar.style.width="25%";
            strengthBar.style.background="red";
            strengthText.innerText="Weak Password";
            break;

        case 2:
            strengthBar.style.width="50%";
            strengthBar.style.background="orange";
            strengthText.innerText="Medium Password";
            break;

        case 3:
            strengthBar.style.width="75%";
            strengthBar.style.background="blue";
            strengthText.innerText="Strong Password";
            break;

        case 4:
            strengthBar.style.width="100%";
            strengthBar.style.background="green";
            strengthText.innerText="Very Strong Password";
            break;
    }
}
</script>

</body>
</html>
