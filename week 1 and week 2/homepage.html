<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITUMBA KE - New Fashion Collection</title>
    <style>
        /* --- Reset & Base Layout --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: #0051ba; /* Matte Royal Blue background matching image canvas */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- Workspace Container --- */
        .desktop-canvas {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 10;
            background-color: #0051ba;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 40px;
        }

        /* --- Header Navigation Bar --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .nav-capsule {
            background-color: #ffffff;
            border-radius: 30px;
            display: flex;
            padding: 4px;
            width: 70%;
            max-width: 720px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .nav-link {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            color: #222222;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.2s ease;
        }

        .nav-link.active {
            color: #b0b0b0; /* Light silver/gray accent for active Home route */
        }

        /* Search input design matching the thin transparent pill */
        .search-container {
            position: relative;
            width: 24%;
            max-width: 260px;
        }

        .search-input {
            width: 100%;
            background-color: transparent;
            border: 1.5px solid #003b8a;
            border-radius: 30px;
            padding: 12px 20px 12px 45px;
            color: #ffffff;
            outline: none;
            font-size: 0.9rem;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        /* --- Main Visual Body --- */
        .main-content {
            display: flex;
            flex-grow: 1;
            gap: 40px;
        }

        /* Left Hero Typography Panel */
        .hero-panel {
            width: 42%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            padding-bottom: 20px;
        }

        .collection-badge {
            text-align: right;
            font-size: 1.1rem;
            color: #1e1e1e;
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: 0.5px;
            align-self: flex-end;
            margin-bottom: -10px;
        }

        .hero-title {
            font-size: 5.5rem;
            font-weight: 800;
            color: #1e1e1e; /* Exact dark graphite color tint */
            line-height: 0.85;
            letter-spacing: -2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .hero-description-block {
            margin-top: 25px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.4;
            color: #ffffff;
            max-width: 240px;
        }

        .shop-btn {
            background-color: transparent;
            border: 1.5px solid #1e1e1e;
            color: #1e1e1e;
            padding: 12px 28px;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 25px;
            cursor: pointer;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            margin-top: 5px;
        }

        .shop-btn:hover {
            background-color: #1e1e1e;
            color: #0051ba;
        }

        /* Lower Brand Identity Section */
        .brand-logo-area {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 30px;
            padding-left: 50px;
        }

        .brand-text {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .handshake-graphic {
            width: 100px;
            height: auto;
            fill: #1e1e1e;
        }

        /* --- Right Showcase Grid Panel --- */
        .catalog-grid {
            width: 58%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            border: 1px solid #1e1e1e;
        }

        .catalog-item {
            position: relative;
            border: 0.5px solid #1e1e1e;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 15px;
        }

        .item-label {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1e1e1e;
            text-transform: uppercase;
            line-height: 1.1;
            max-width: 90px;
            z-index: 2;
        }

        .model-image {
            height: 85%;
            width: auto;
            max-width: 90%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
        }

        .price-tag {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="desktop-canvas">
        
        <!-- ================= NAVIGATION HEADER ================= -->
        <header>
            <div class="nav-capsule">
                <a class="nav-link active">Home</a>
                <a href="product.html">Shop</a>
                <a class="nav-link">About Us</a>
                <a class="nav-link">Collection</a>
            </div>
            
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#003b8a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" disabled>
            </div>
        </header>

        <!-- ================= MAIN SECTION ================= -->
        <main class="main-content">
            
            <!-- Left Panel: Brand Headers & Logo Details -->
            <div class="hero-panel">
                <div>
                    <div class="collection-badge">New collection<br>2030</div>
                    <h1 class="hero-title">New<br>Fashion</h1>
                    
                    <div class="hero-description-block">
                        <p class="hero-subtitle">Discover Your Favorite Style: All the Fashion You Need Awaits Here!</p>
                        <button class="shop-btn">Shop Now</button>
                    </div>
                </div>

                <!-- Footer area matching bottom alignment logo -->
                <div class="brand-logo-area">
                    <div class="brand-text">Mitumba<br>Ke</div>
                    <!-- Scaled high-fidelity inline SVG handshake vector layout -->
                    <svg class="handshake-graphic" viewBox="0 0 24 24">
                        <path d="M19.5 9.5a2.5 2.5 0 0 0-3.5 0l-1.5 1.5-1-1-1.5 1.5 4 4 3.5-3.5a2.5 2.5 0 0 0 0-3.5zm-11 5.5l-4-4a2.5 2.5 0 0 0-3.5 3.5l5.5 5.5 2-2z M10.5 12.5l-1.5-1.5-4 4 1.5 1.5 4-4z"/>
                        <path d="M12 14l-2-2 2-2 4 4-2 2zm6.5-1.5l1.5-1.5a1 1 0 0 0 0-1.41l-.09-.09a1 1 0 0 0-1.41 0l-1.5 1.5 1.5 1.5z"/>
                        <path d="M7.5 16.5l-2.5-2.5-1.5 1.5 2.5 2.5 1.5-1.5zm-3-3l-2.5-2.5-1.5 1.5 2.5 2.5 1.5-1.5z"/>
                    </svg>
                </div>
            </div>

            <!-- Right Panel: High Fashion Grid Layout -->
            <div class="catalog-grid">
                
                <!-- Card 1 -->
                <div class="catalog-item">
                    <div class="item-label">Black<br>Jumpsuit</div>
                    <img class="model-image" src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=400&q=80" alt="Black Jumpsuit model presentation">
                    <div class="price-tag">$600</div>
                </div>

                <!-- Card 2 -->
                <div class="catalog-item">
                    <div class="item-label">Wide-Leg<br>Jeans</div>
                    <img class="model-image" src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=400&q=80" alt="Wide-Leg Jeans model presentation">
                    <div class="price-tag">$400</div>
                </div>

                <!-- Card 3 -->
                <div class="catalog-item">
                    <div class="item-label">Cream Ribbed<br>Top</div>
                    <img class="model-image" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=400&q=80" alt="Cream Ribbed Top model presentation">
                    <div class="price-tag">$300</div>
                </div>

                <!-- Card 4 -->
                <div class="catalog-item">
                    <div class="item-label">Wrap<br>Shirt</div>
                    <img class="model-image" src="https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&w=400&q=80" alt="Wrap Shirt model presentation">
                    <div class="price-tag">$500</div>
                </div>

                <!-- Card 5 -->
                <div class="catalog-item">
                    <div class="item-label">Graphite<br>Suit</div>
                    <img class="model-image" src="https://images.unsplash.com/photo-1581044777550-4cfa60707c03?auto=format&fit=crop&w=400&q=80" alt="Graphite Suit model presentation">
                    <div class="price-tag">$600</div>
                </div>

                <!-- Card 6 -->
                <div class="catalog-item">
                    <div class="item-label">Long Black<br>Dress</div>
                    <img class="model-image" src="https://images.unsplash.com/photo-1509319117193-57bab727e09d?auto=format&fit=crop&w=400&q=80" alt="Long Black Dress model presentation">
                    <div class="price-tag">$400</div>
                </div>

            </div>

        </main>
    </div>

</body>
</html>
