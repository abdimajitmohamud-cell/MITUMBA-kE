<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITUMBA kE - Products</title>
    <style>
        /* Base Reset & Layout Constraints */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0d52bd; /* The vibrant signature storefront blue */
            color: #ffffff;
            min-height: 100vh;
            padding: 40px;
            overflow-x: hidden;
        }

        /* Top Navigation Header Area */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 55px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        /* Minimalist Hamburger Menu Button */
        .menu-icon {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            width: 32px;
        }

        .menu-icon span {
            display: block;
            height: 4px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 45px;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.15rem;
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }

        nav ul li a:hover, nav ul li a.active {
            opacity: 1;
        }

        /* Brand Headers & Logo Alignment */
        .brand {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .brand-text {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-align: right;
            line-height: 1.15;
            text-transform: uppercase;
        }

        /* Vector Handshake Graphic */
        .handshake-icon {
            width: 75px;
            height: 75px;
            fill: #000000; /* Solid dark graphic contrast overlay */
        }

        /* Core Catalog Showcase Grid Matrix (4x2 Structure) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 35px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }

        /* Style Profile for Row 1: Smooth Rounded Cards */
        .card-img-top {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 20px; 
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Style Profile for Row 2: Full Height Studio Portals */
        .card-img-bottom {
            width: 100%;
            height: 440px;
            object-fit: cover;
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.05);
        }

        /* Product Description Metadata Panels */
        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        /* Distinct Pink/Magenta Price Values */
        .price-pink {
            color: #d946ef;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .product-name {
            color: #ffffff;
            text-align: right;
            font-weight: 600;
            opacity: 0.95;
        }

        /* Row 2 Centered Text Price Nodes */
        .price-center {
            text-align: center;
            font-weight: 700;
            margin-top: 14px;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }

        /* Interactive Capsule/Pill Layout Component */
        .pill-button {
            background-color: #ffffff;
            height: 26px;
            width: 85px;
            border-radius: 15px;
            margin: 18px auto 0 auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .pill-button:hover {
            transform: scale(1.05);
        }

        /* Adaptive Mobile Layout Overrides */
        @media (max-width: 1100px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 650px) {
            header {
                flex-direction: column;
                gap: 25px;
            }
            .brand-text {
                text-align: center;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav>
                <ul>
                    <li><a href="homepage.html">Home</a></li>
                    <li><a href="#" class="active">Product</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="dashboard.html">Dashboard</li>
                </ul>
            </nav>
        </div>
        
        <div class="brand">
            <div class="brand-text">MITUMBA<br>kE</div>
            <svg class="handshake-icon" viewBox="0 0 24 24">
                <path d="M21.71 10.29l-3.5-3.5a1 1 0 0 0-1.42 0L14.3 9.28l-1.63-1.62a3 3 0 0 0-4.24 0L2.29 13.8a1 1 0 0 0 0 1.41l3.5 3.5a1 1 0 0 0 1.42 0l2.49-2.48 1.63 1.62a3 3 0 0 0 4.24 0l6.14-6.14a1 1 0 0 0 .01-1.42zM7.21 16.59L4.41 13.8l5.44-5.44 2.8 2.8zm11.66-5.54l-5.44 5.44-2.8-2.8 5.44-5.44z"/>
            </svg>
        </div>
    </header>

    <main class="products-grid">
        
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=500&q=80" alt="Oversized T-shirt" class="card-img-top">
            <div class="product-info">
                <span class="price-pink">$389.99</span>

        <div class="product-card">

            <div class="product-info">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1556905055-8f358a7a47b2?auto=format&fit=crop&w=500&q=80" alt="Comfort Gray Hoodie Knitwear" class="card-img-top">
            <div class="product-info">
                <span class="price-pink">$431.99</span>

        </div>

        <div class="product-card">

            <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=500&q=80" alt="Avant Garde Editorial Suit Set" class="card-img-bottom">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&w=500&q=80" alt="Minimalist Portrait Look" class="card-img-bottom">
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=500&q=80" alt="Avant Garde Structured Dress Outfit" class="card-img-bottom">
            <div class="price-center">$300</div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1509319117193-57bab727e09d?auto=format&fit=crop&w=500&q=80" alt="Flowing Dark Fashion Gown" class="card-img-bottom">
            <div class="pill-button"></div>
        </div>

    </main>

</body>
</html>
