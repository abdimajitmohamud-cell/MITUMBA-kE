<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITUMBA.ke - Authentication</title>
    <style>
        /* --- Root Variables & Reset --- */
        :root {
            --primary-purple: #6211ff;
            --button-purple: #b983ff;
            --text-gray: #888888;
            --input-border: #cccccc;
            --bg-light: #ffffff;
            --font-main: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body, html {
            height: 100%;
            background-color: var(--bg-light);
            overflow: hidden;
        }

        /* --- Layout Structure --- */
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- Left Brand Section --- */
        .brand-panel {
            width: 50%;
            background-color: var(--primary-purple);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            position: relative;
            padding: 20px;
        }

        .brand-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .brand-subtitle {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* --- Right Form Section --- */
        .form-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-light);
        }

        /* View-switching logic */
        .auth-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .auth-view.active {
            display: flex;
        }

        /* --- Header Styles --- */
        .form-header {
            height: 22%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid #333333;
            padding-top: 20px;
        }

        .form-header h2 {
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 3px;
            margin-bottom: 15px;
            color: #000000;
        }

        /* Specific Purple Header for Forgot Password */
        .forgot-header h2 {
            color: var(--button-purple);
        }

        .switch-link {
            color: var(--button-purple);
            text-decoration: none;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .switch-link-dark {
            color: #000000;
            text-decoration: none;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* --- Body & Input Styles --- */
        .form-body {
            padding: 60px 10% 20px 10%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex-grow: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            color: var(--text-gray);
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            max-width: 520px;
            padding: 18px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 1.1rem;
            color: #333333;
            outline: none;
        }

        /* --- Button Component --- */
        .submit-btn {
            display: inline-block;
            width: 100%;
            max-width: 380px;
            background-color: var(--button-purple);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            align-self: flex-start;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s ease;
            text-align: center;
            text-decoration: none;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* --- Image 3 Retro Graphics Popups --- */
        .retro-graphics {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            pointer-events: none;
        }

        .active-graphics {
            display: block;
        }

        /* Gradient Block */
        .gradient-box {
            position: absolute;
            top: 44%;
            left: 13%;
            width: 340px;
            height: 230px;
            background: linear-gradient(135deg, #b983ff, #ff8da1);
            border: 2px dashed #333333;
        }

        /* Paint Bucket Icon */
        .paint-bucket {
            position: absolute;
            top: 45%;
            left: 15%;
            width: 50px;
            height: 50px;
            background: white;
            border: 2px solid black;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0px black;
        }
        .paint-bucket::before {
            content: '';
            width: 20px;
            height: 15px;
            border: 2px solid black;
            border-bottom: none;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            position: absolute;
            top: -15px;
        }

        /* Loading Window Popup */
        .progress-window {
            position: absolute;
            top: 29%;
            left: 36%;
            width: 420px;
            background: linear-gradient(to bottom, #ff9ebb, #ff8da1);
            border: 2px solid #333333;
            box-shadow: 4px 4px 0px #000000;
            pointer-events: auto;
        }

        .window-header {
            background-color: #cbb4ff;
            padding: 6px 10px;
            border-bottom: 2px solid #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #000000;
        }

        .close-btn {
            width: 18px;
            height: 18px;
            border: 2px solid #333333;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .window-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .loading-text {
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #000000;
        }

        .progress-bar-container {
            width: 100%;
            height: 22px;
            border: 2px solid #333333;
            background-color: #cbb4ff;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            width: 85%;
            height: 100%;
            background-color: #ffffff;
        }

        .stop-btn {
            align-self: flex-end;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 6px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="brand-panel">
            <div class="brand-title">MITUMBA.ke</div>
            <div id="brand-subtitle-text" class="brand-subtitle">Ng’ara in style</div>

            <div id="retro-popups" class="retro-graphics">
                <div class="gradient-box"></div>
                <div class="paint-bucket">🪣</div>
                <div class="progress-window">
                    <div class="window-header">
                        <span>PROGRESS</span>
                        <div class="close-btn" onclick="navigateTo('login')">X</div>
                    </div>
                    <div class="window-body">
                        <div class="loading-text">LOADING...</div>
                        <div class="progress-bar-container">
                            <div class="progress-fill"></div>
                        </div>
                        <button class="stop-btn" onclick="navigateTo('login')">STOP</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-panel">

            <!-- --- SIGN UP VIEW --- -->
            <div id="signup-view" class="auth-view active">
                <div class="form-header">
                    <h2>SiGN UP</h2>
                    <span class="switch-link" onclick="navigateTo('login')">Already Registered? Login</span>
                </div>
                <div class="form-body">
                    <div class="input-group">
                        <label>Please enter your name</label>
                        <input type="text" value="Abdi Majit">
                    </div>
                    <div class="input-group">
                        <label>Please enter Email</label>
                        <input type="email" value="abdi@gmail.com">
                    </div>
                    <div class="input-group">
                        <label>Please enter password</label>
                        <input type="password" value="******">
                    </div>
                    <div class="input-group">
                        <label>Please enter date of birth</label>
                        <input type="text" value="01/08/2000">
                    </div>
                    <!-- Direct Link Integration to Storefront Homepage -->
                    <a href="homepage.html" class="submit-btn">SIGN UP</a>
                </div>
            </div>

            <!-- --- LOGIN VIEW --- -->
            <div id="login-view" class="auth-view">
                <div class="form-header">
                    <h2>LOGIN</h2>
                    <span class="switch-link-dark" onclick="navigateTo('signup')">Don’t have an account? Sign Up</span>
                </div>
                <div class="form-body">
                    <div class="input-group">
                        <label>Please enter Email</label>
                        <input type="email" value="abdi@gmail.com">
                    </div>
                    <div class="input-group">
                        <label>Please enter password</label>
                        <input type="password" value="******">
                    </div>
                    <span class="switch-link" style="margin-top:-10px; font-size: 0.95rem;" onclick="navigateTo('forgot')">Forgot Password?</span>
                    <!-- Direct Link Integration to Storefront Homepage -->
                    <a href="homepage.html" class="submit-btn">LOGIN</a>
                </div>
            </div>

            <!-- --- FORGOT PASSWORD VIEW --- -->
            <div id="forgot-view" class="auth-view">
                <div class="form-header forgot-header">
                    <h2>Forgot Password</h2>
                    <span class="switch-link" onclick="navigateTo('login')">Back to Login</span>
                </div>
                <div class="form-body" style="padding-top: 80px;">
                    <div class="input-group">
                        <label>Please enter Email</label>
                        <input type="email" value="abdi@gmail.com">
                    </div>
                    <!-- Triggers recovery flow script or can link directly -->
                    <button class="submit-btn" style="max-width: 380px;" onclick="alert('Password reset link dispatched successfully!')">SEND</button>
                    <a href="homepage.html" class="switch-link" style="text-align: center; margin-top: 15px; max-width: 380px;">← Cancel & Return to Shop</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function navigateTo(viewName) {
            // Deactivate all views
            document.querySelectorAll('.auth-view').forEach(view => {
                view.classList.remove('active');
            });

            // Hide assets panel elements by default
            const retroPopups = document.getElementById('retro-popups');
            const brandSubtitle = document.getElementById('brand-subtitle-text');
            retroPopups.classList.remove('active-graphics');
            brandSubtitle.style.display = "block";

            // Activate chosen route view
            if (viewName === 'signup') {
                document.getElementById('signup-view').classList.add('active');
            } else if (viewName === 'login') {
                document.getElementById('login-view').classList.add('active');
                brandSubtitle.innerText = "Ng’ara In Style"; // Capitalization match for view 2
            } else if (viewName === 'forgot') {
                document.getElementById('forgot-view').classList.add('active');
                // Display the retro window UI elements matching image 3 layout
                retroPopups.classList.add('active-graphics');
                brandSubtitle.style.display = "none";
            }
        }
    </script>
</body>
</html>
